<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio — Project Cards</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
      }
      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.2rem;
        margin-top: 1rem;
      }
      .project-card {
        border: 1px solid #ddd;
        border-radius: 10px;
        overflow: hidden;
        transition: transform 0.3s;
        background: white;
        position: relative;
      }
      .project-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }
      .project-card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }
      .project-card .info {
        padding: 0.8rem;
      }
      .project-card h3 {
        font-size: 1rem;
        margin-bottom: 0.2rem;
      }
      .project-card .category {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 10px;
        color: white;
        display: inline-block;
        margin-bottom: 0.4rem;
      }
      .cat-web {
        background: #3498db;
      }
      .cat-mobile {
        background: #27ae60;
      }
      .cat-design {
        background: #9b59b6;
      }
      .project-card .desc {
        font-size: 13px;
        color: #666;
      }
      .project-card .tags {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }
      .project-card .tag {
        font-size: 11px;
        background: #f0f0f0;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .featured {
        position: absolute;
        top: 8px;
        right: 8px;
        background: #e74c3c;
        color: white;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: #999;
      }
    </style>
  </head>
  <body>
    <h1>🛠️ Dự án của Trường</h1>
    <div id="root"></div>

    <script type="text/babel">
      const projects = [
        {
          id: 1,
          title: "Portfolio Website",
          category: "web",
          image: "https://picsum.photos/300/200?random=1",
          description: "Trang cá nhân xây dựng bằng HTML/CSS",
          tags: ["HTML", "CSS"],
          featured: true,
        },
        {
          id: 2,
          title: "Todo App",
          category: "web",
          image: "https://picsum.photos/300/200?random=2",
          description: "Ứng dụng quản lý công việc",
          tags: ["JavaScript", "DOM"],
          featured: false,
        },
        {
          id: 3,
          title: "Weather App",
          category: "mobile",
          image: "https://picsum.photos/300/200?random=3",
          description: "Xem thời tiết theo vị trí",
          tags: ["React", "API"],
          featured: false,
        },
        {
          id: 4,
          title: "Poster Design",
          category: "design",
          image: "https://picsum.photos/300/200?random=4",
          description: "Thiết kế poster sự kiện",
          tags: ["Figma", "Photoshop"],
          featured: false,
        },
      ];

      function CategoryBadge({ category }) {
        const catClass = category === "web" ? "cat-web" : category === "mobile" ? "cat-mobile" : "cat-design";
        const label = category.charAt(0).toUpperCase() + category.slice(1);
        return <span className={`category ${catClass}`}>{label}</span>;
      }

      function ProjectCard({ title, category, image, description, tags, featured }) {
        return (
          <div className="project-card">
            <img src={image} alt={title} />
            {featured && <span className="featured">⭐ Nổi bật</span>}
            <div className="info">
              <CategoryBadge category={category} />
              <h3>{title}</h3>
              <p className="desc">{description}</p>
              <div className="tags">
                {tags.map((tag) => (
                  <span key={tag} className="tag">
                    {tag}
                  </span>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function ProjectList({ projects }) {
        if (projects.length === 0) {
          return <div className="empty-state">Chưa có dự án nào</div>;
        }
        return (
          <div>
            <p>Tổng: {projects.length} dự án</p>
            <div className="project-grid">
              {projects.map((project) => (
                <ProjectCard key={project.id} {...project} />
              ))}
            </div>
          </div>
        );
      }

      function App() {
        return <ProjectList projects={projects} />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
