<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio — Hero & Skills</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
      }
      .hero {
        background: linear-gradient(135deg, #3498db, #2c3e50);
        color: white;
        text-align: center;
        padding: 3rem 2rem;
        border-radius: 12px;
        margin-bottom: 2rem;
      }
      .hero h1 {
        font-size: 2rem;
        margin-bottom: 0.3rem;
      }
      .hero p {
        opacity: 0.85;
        margin-bottom: 1rem;
      }
      .hero button {
        padding: 10px 24px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
      }
      .skills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        justify-content: center;
      }
      .skill-badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
        color: white;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .skill-badge .level {
        font-size: 11px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const skills = [
        { name: "HTML5", level: 95, color: "#e34c26" },
        { name: "CSS3", level: 90, color: "#264de4" },
        { name: "JavaScript", level: 85, color: "#f0db4f" },
        { name: "React", level: 70, color: "#61dafb" },
        { name: "Node.js", level: 60, color: "#68a063" },
      ];

      function PortfolioHero({ name, title, buttonText }) {
        return (
          <div className="hero">
            <h1>Xin chào, tôi là {name}</h1>
            <p>{title}</p>
            <button>{buttonText}</button>
          </div>
        );
      }

      function SkillBadge({ name, level, color }) {
        return (
          <span className="skill-badge" style={{ background: color }}>
            {name} <span className="level">({level}%)</span>
          </span>
        );
      }

      function SkillsSection({ skills }) {
        return (
          <div>
            <h2 style={{ textAlign: "center", marginBottom: "1rem" }}>Kỹ năng</h2>
            <div className="skills">
              {skills.map((skill) => (
                <SkillBadge key={skill.name} name={skill.name} level={skill.level} color={skill.color} />
              ))}
            </div>
          </div>
        );
      }

      function App() {
        return (
          <div>
            <PortfolioHero name="Trường" title="Full-Stack Developer | UI Designer" buttonText="Xem dự án" />
            <SkillsSection skills={skills} />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
